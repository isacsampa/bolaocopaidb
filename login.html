<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão Copa 2026 — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="auth-screen" class="screen active">

    <div class="auth-bg">
      <div class="auth-bg__orb orb1"></div>
      <div class="auth-bg__orb orb2"></div>
      <div class="auth-bg__orb orb3"></div>
      <div class="auth-bg__grid"></div>
    </div>

    <div class="auth-container">
      <header class="auth-header">
        <div class="fwc-logo-main">
          <svg class="fwc-logo-main__bg-svg" viewBox="0 0 100 164" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <mask id="fwc-26-mask">
                <!-- Everything white is visible -->
                <rect x="-10" y="-10" width="120" height="184" fill="#ffffff" />
                <!-- Left waist slit -->
                <rect x="-5" y="35" width="60" height="10" fill="#000000" />
                <!-- Pill cutout in '2' loop -->
                <rect x="34" y="14" width="32" height="12" fill="#000000" rx="6" />
                <!-- Right waist slit -->
                <rect x="45" y="119" width="60" height="10" fill="#000000" />
                <!-- 'FIFA' cutout in '6' loop -->
                <text x="50" y="145" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="15" fill="#000000" text-anchor="middle" letter-spacing="0.5">FIFA</text>
              </mask>
            </defs>
            <!-- Draw '2' and '6' shapes using the mask -->
            <g mask="url(#fwc-26-mask)" fill="#ffffff">
              <!-- Geometric 2 -->
              <path d="M 0,80 L 100,80 L 100,50 A 50,50 0 0,0 0,50 Z" />
              <!-- Geometric 6 -->
              <path d="M 100,84 L 0,84 L 0,114 A 50,50 0 0,1 100,114 Z" />
            </g>
            <!-- TM Symbol at the bottom right -->
            <text x="73" y="162" font-family="sans-serif" font-size="4" font-weight="bold" fill="#ffffff" transform="rotate(-90 73 162)" opacity="0.8">TM</text>
          </svg>
          <img class="fwc-logo-main__trophy" src="fifa_trophy.png" alt="Copa do Mundo 2026" />
        </div>
        <h1 class="auth-title">BOLÃO COPA 2026</h1>
        <p class="auth-subtitle">Bolão Oficial da Copa do Mundo FIFA 2026</p>
      </header>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button type="button" class="tab-btn active" data-tab="login">Entrar</button>
        <button type="button" class="tab-btn" data-tab="signup">Cadastrar</button>
      </div>

      <!-- Form Login -->
      <form id="form-login" class="auth-form active" novalidate>
        <div class="field-group">
          <label for="login-email">E-mail</label>
          <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="login-senha">Senha</label>
          <div class="input-password-wrap">
            <input id="login-senha" type="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" data-target="login-senha">👁</button>
          </div>
        </div>
        <div id="login-error" class="form-error" hidden></div>
        <button type="submit" class="btn-primary" id="btn-login">
          <span class="btn-text">Entrar</span>
          <span class="btn-spinner" hidden></span>
        </button>
      </form>

      <!-- Form Signup -->
      <form id="form-signup" class="auth-form" novalidate>
        <div class="field-group">
          <label for="signup-nome">Nome completo</label>
          <input id="signup-nome" type="text" placeholder="Seu nome" autocomplete="name" />
        </div>
        <div class="field-group">
          <label for="signup-email">E-mail</label>
          <input id="signup-email" type="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="signup-senha">Senha</label>
          <div class="input-password-wrap">
            <input id="signup-senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-pw" data-target="signup-senha">👁</button>
          </div>
        </div>
        <div id="signup-error" class="form-error" hidden></div>
        <button type="submit" class="btn-primary" id="btn-signup">
          <span class="btn-text">Criar conta</span>
          <span class="btn-spinner" hidden></span>
        </button>
      </form>
    </div>

  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
