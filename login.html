<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão Copa 2026 — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2" />
  <script>
    (function() {
      const savedTheme = localStorage.getItem('bolao-theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
    })();
  </script>
</head>
<body>
  <div id="auth-screen" class="screen active">

    <div class="auth-bg">
      <div class="auth-bg__orb orb1"></div>
      <div class="auth-bg__orb orb2"></div>
      <div class="auth-bg__orb orb3"></div>
      <div class="auth-bg__grid"></div>
    </div>

    <div class="auth-container">
      <div class="we-are-26-banner-wrap">
        <span class="we-are-26-banner-text">#WEARE26</span>
      </div>
      <button type="button" id="btn-theme-toggle" class="theme-toggle-btn" title="Alternar tema">🌙</button>
      <header class="auth-header">
        <div class="fwc-logo-main">
          <img class="fwc-logo-main__img" src="logo%20fifa.png?v=3" alt="Copa do Mundo 2026" />
        </div>
        <h1 class="auth-title">BOLÃO COPA 2026</h1>
        <p class="auth-subtitle">Bolão Oficial da Copa do Mundo FIFA 2026</p>
      </header>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button type="button" class="tab-btn active" data-tab="login">Entrar</button>
        <button type="button" class="tab-btn" data-tab="signup">Cadastrar</button>
      </div>

      <!-- Form Login -->
      <form id="form-login" class="auth-form active" novalidate>
        <div class="field-group">
          <label for="login-email">E-mail</label>
          <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="login-senha">Senha</label>
          <div class="input-password-wrap">
            <input id="login-senha" type="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" data-target="login-senha">👁</button>
          </div>
        </div>
        <div id="login-error" class="form-error" hidden></div>
        <button type="submit" class="btn-primary" id="btn-login">
          <span class="btn-text">Entrar</span>
          <span class="btn-spinner" hidden></span>
        </button>
        <div class="auth-helper-links">
          <a href="#" id="link-forgot-pw" class="auth-link">Esqueceu sua senha?</a>
          <p class="auth-switch-text">Não tem uma conta? <a href="#" id="link-to-signup" class="auth-link">Cadastre-se</a></p>
        </div>
      </form>

      <!-- Form Signup -->
      <form id="form-signup" class="auth-form" novalidate>
        <div class="field-group">
          <label for="signup-nome">Nome completo</label>
          <input id="signup-nome" type="text" placeholder="Seu nome" autocomplete="name" />
        </div>
        <div class="field-group">
          <label for="signup-email">E-mail</label>
          <input id="signup-email" type="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="signup-senha">Senha</label>
          <div class="input-password-wrap">
            <input id="signup-senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-pw" data-target="signup-senha">👁</button>
          </div>
        </div>
        <div id="signup-error" class="form-error" hidden></div>
        <button type="submit" class="btn-primary" id="btn-signup">
          <span class="btn-text">Criar conta</span>
          <span class="btn-spinner" hidden></span>
        </button>
        <div class="auth-helper-links">
          <p class="auth-switch-text">Já tem uma conta? <a href="#" id="link-to-login" class="auth-link">Entrar</a></p>
        </div>
      </form>

      <!-- Form Recovery -->
      <form id="form-recovery" class="auth-form" novalidate>
        <div class="field-group">
          <label for="recovery-email">E-mail para recuperação</label>
          <input id="recovery-email" type="email" placeholder="seu@email.com" />
        </div>
        <div id="recovery-error" class="form-error" hidden></div>
        <div id="recovery-success" class="form-success-alert" hidden></div>
        <button type="submit" class="btn-primary" id="btn-recovery">
          <span class="btn-text">Enviar Link</span>
          <span class="btn-spinner" hidden></span>
        </button>
        <button type="button" id="btn-back-to-login" class="btn-secondary" style="margin-top: 0.5rem; justify-content: center; width: 100%;">Voltar para o Login</button>
      </form>
    </div>

  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
