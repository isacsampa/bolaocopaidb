<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão Copa 2026 — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="auth-screen" class="screen active">

    <div class="auth-bg">
      <div class="auth-bg__orb orb1"></div>
      <div class="auth-bg__orb orb2"></div>
      <div class="auth-bg__orb orb3"></div>
      <div class="auth-bg__grid"></div>
    </div>

    <div class="auth-container">
      <header class="auth-header">
        <div class="fwc-logo-main">
          <div class="fwc-logo-main__bg">
            <div>2</div>
            <div>6</div>
          </div>
          <svg class="fwc-logo-main__trophy" viewBox="0 0 100 240" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Base -->
            <path d="M30,220 L70,220 L65,200 L35,200 Z" fill="url(#gold-grad)" />
            <path d="M35,200 L65,200 L62,185 L38,185 Z" fill="url(#gold-grad-2)" />
            <!-- Stem -->
            <path d="M42,185 L58,185 L55,130 L45,130 Z" fill="url(#gold-grad)" />
            <!-- Ball/World -->
            <circle cx="50" cy="90" r="28" fill="url(#world-grad)" />
            <!-- Upper supports -->
            <path d="M35,130 C35,145 42,165 50,165 C58,165 65,145 65,130 C65,115 50,110 50,90 C50,110 35,115 35,130 Z" fill="url(#gold-grad-3)" />
            <path d="M38,135 C38,105 45,95 48,65 C43,68 32,80 32,105 C32,130 40,150 48,155 C42,150 38,140 38,135 Z" fill="url(#gold-grad-2)" />
            <path d="M62,135 C62,105 55,95 52,65 C57,68 68,80 68,105 C68,130 60,150 52,155 C58,150 62,140 62,135 Z" fill="url(#gold-grad-2)" />
            
            <defs>
              <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#FFF3B0" />
                <stop offset="30%" stop-color="#CA9E5A" />
                <stop offset="70%" stop-color="#8E672F" />
                <stop offset="100%" stop-color="#F2D091" />
              </linearGradient>
              <linearGradient id="gold-grad-2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#F9E0A2" />
                <stop offset="100%" stop-color="#7B541C" />
              </linearGradient>
              <linearGradient id="gold-grad-3" x1="1" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
                <stop offset="50%" stop-color="#CA9E5A" />
                <stop offset="100%" stop-color="#54380E" />
              </linearGradient>
              <radialGradient id="world-grad" cx="50%" cy="40%" r="50%">
                <stop offset="0%" stop-color="#FFF3B0" />
                <stop offset="50%" stop-color="#B28747" />
                <stop offset="100%" stop-color="#4E340E" />
              </radialGradient>
            </defs>
          </svg>
        </div>
        <h1 class="auth-title">BOLÃO COPA 2026</h1>
        <p class="auth-subtitle">Bolão Oficial da Copa do Mundo FIFA 2026</p>
      </header>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button type="button" class="tab-btn active" data-tab="login">Entrar</button>
        <button type="button" class="tab-btn" data-tab="signup">Cadastrar</button>
      </div>

      <!-- Form Login -->
      <form id="form-login" class="auth-form active" novalidate>
        <div class="field-group">
          <label for="login-email">E-mail</label>
          <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="login-senha">Senha</label>
          <div class="input-password-wrap">
            <input id="login-senha" type="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" data-target="login-senha">👁</button>
          </div>
        </div>
        <div id="login-error" class="form-error" hidden></div>
        <button type="submit" class="btn-primary" id="btn-login">
          <span class="btn-text">Entrar</span>
          <span class="btn-spinner" hidden></span>
        </button>
      </form>

      <!-- Form Signup -->
      <form id="form-signup" class="auth-form" novalidate>
        <div class="field-group">
          <label for="signup-nome">Nome completo</label>
          <input id="signup-nome" type="text" placeholder="Seu nome" autocomplete="name" />
        </div>
        <div class="field-group">
          <label for="signup-email">E-mail</label>
          <input id="signup-email" type="email" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="signup-senha">Senha</label>
          <div class="input-password-wrap">
            <input id="signup-senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-pw" data-target="signup-senha">👁</button>
          </div>
        </div>
        <div id="signup-error" class="form-error" hidden></div>
        <button type="submit" class="btn-primary" id="btn-signup">
          <span class="btn-text">Criar conta</span>
          <span class="btn-spinner" hidden></span>
        </button>
      </form>
    </div>

  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
